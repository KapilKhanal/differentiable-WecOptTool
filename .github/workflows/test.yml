name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install wecopttool wecopttool[ipopt]
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest tests/ -v --tb=short
